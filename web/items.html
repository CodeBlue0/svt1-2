<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SVT Individual Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="site-shell item-page">
      <header class="hero-shell compact-hero">
        <nav class="top-nav" aria-label="SVT dashboard pages">
          <a class="brand" href="index.html">SVT Studio</a>
          <div class="nav-controls">
            <div class="dataset-switcher" data-dataset-switcher aria-label="데이터셋 선택"></div>
            <div class="nav-links">
              <a class="nav-link active" href="index.html">개인 분석</a>
              <a class="nav-link" href="insights.html">그룹별 분석</a>
            </div>
          </div>
        </nav>
        <section class="hero-grid">
          <div>
            <p class="eyebrow">single select</p>
            <h1>개인 분석</h1>
            <p id="itemSummary" class="summary-text">참가자 1명을 선택하세요.</p>
          </div>
          <div class="control-card">
            <label class="search-label" for="participantSelect">검색</label>
            <select id="participantSelect" class="search-input"></select>
          </div>
        </section>
      </header>

      <section class="dashboard-panel">
        <section class="panel-section feature-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">individual overview</p>
              <h2 id="selectedParticipantTitle">선택하세요</h2>
              <p id="selectedParticipantMeta" class="summary-text"></p>
            </div>
          </div>
          <div class="chart-grid">
            <article class="chart-card">
              <div class="chart-card-heading">
                <h3>모델</h3>
                <div class="model-legend" aria-label="범례">
                  <span><i class="dot-red"></i>실제</span>
                  <span><i class="line-blue"></i>예측</span>
                </div>
              </div>
              <svg id="modelChart" class="chart" viewBox="0 0 720 340"></svg>
              <div id="modelEquations" class="model-equations" aria-label="함수식"></div>
            </article>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-heading compact"><div><p class="eyebrow">personal confusion matrix</p><h2>O/X 응답 분석</h2></div></div>
          <div id="confusionList" class="confusion-list"></div>
        </section>

        <section class="panel-section">
          <div class="section-heading compact">
            <div>
              <p class="eyebrow">answer transition by next test</p>
              <h2>이전→다음 정오답 변화</h2>
              <p class="summary-text">공통 문항 중 양쪽 회차 모두 응답한 문항 기준</p>
            </div>
          </div>
          <div id="transitionList" class="transition-list"></div>
          <div class="transition-line-panel">
            <div class="legend transition-line-legend" aria-label="전환 그래프 범례">
              <span class="legend-item"><span class="swatch swatch-red"></span>모르는 내용(오답 유지)</span>
              <span class="legend-item"><span class="swatch swatch-yellow"></span>실수(정답→오답)</span>
            </div>
            <svg id="transitionLineChart" class="chart transition-line-chart" viewBox="0 0 1040 500" role="img" aria-label="오답 유지와 정답에서 오답 전환 개수 그래프"></svg>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-heading compact">
            <div>
              <p class="eyebrow">common 176 items</p>
              <h2>문항 지도</h2>
              <p id="itemMapSummary" class="summary-text">공통 문항 176개</p>
            </div>
            <div class="graph-controls item-map-controls">
              <div class="legend item-legend item-map-legend"><span class="legend-item"><span class="grass-swatch green"></span>정답</span><span class="legend-item"><span class="grass-swatch red"></span>오답</span><span class="legend-item"><span class="grass-swatch gray"></span>미실시</span></div>
              <div id="itemMapMode" class="transition-filter item-map-mode-filter" aria-label="문항 지도 기준"></div>
            </div>
          </div>
          <div id="itemGrid" class="item-grid-panel"></div>
        </section>

      </section>
    </main>
    <script src="data.js"></script>
    <script src="dataset-switcher.js"></script>
    <script src="items.js"></script>
  </body>
</html>
